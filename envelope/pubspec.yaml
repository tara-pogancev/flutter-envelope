name: envelope
description: "Envelope - Daily journal for letting your mind breathe."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  dynamic_color: ^1.8.1
  flutter:
    sdk: flutter
  flutter_m3shapes: ^1.0.0+2
  google_fonts: ^8.1.0
  intl: any
  material_symbols_icons: ^4.2928.1
  slang: ^4.15.0
  slang_flutter: ^4.15.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.12.0
  flutter_gen_runner:
  slang_build_runner:

flutter:
  uses-material-design: true

  assets:
    - assets/images/
